<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <rect width="700" height="450" fill="#e8e4da"/>

  <!-- thin border -->
  <rect x="1" y="1" width="698" height="448" rx="3" fill="none" stroke="#c4b99a" stroke-width="0.5"/>

  <!-- ── Left: variety tree ── -->
  <text x="42" y="38" fill="#1a2744" font-size="14" font-weight="700" letter-spacing="0.5">Sources</text>

  <!-- trunk lines -->
  <line x1="52" y1="56" x2="52" y2="300" stroke="#b8af9a" stroke-width="1.5"/>

  <!-- Modern Greek branch -->
  <line x1="52" y1="72" x2="76" y2="72" stroke="#b8af9a" stroke-width="1.5"/>
  <text x="80" y="76" fill="#1a2744" font-size="13" font-weight="700">Modern Greek</text>
  <line x1="80" y1="84" x2="80" y2="186" stroke="#b8af9a" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="92" y="100" fill="#3d3d3d" font-size="11">SMG / Demotic</text>
  <text x="92" y="118" fill="#3d3d3d" font-size="11">Katharevousa</text>
  <text x="92" y="136" fill="#3d3d3d" font-size="11">Cypriot</text>
  <text x="92" y="154" fill="#3d3d3d" font-size="11">Cretan</text>
  <text x="92" y="172" fill="#3d3d3d" font-size="11">Medieval / Byzantine</text>
  <text x="92" y="190" fill="#6b6560" font-size="10">Heptanesian, Maniot</text>
  <text x="92" y="206" fill="#8a8279" font-size="9" font-style="italic">877K + 8K tagged entries</text>

  <!-- Ancient Greek branch -->
  <line x1="52" y1="240" x2="76" y2="240" stroke="#b8af9a" stroke-width="1.5"/>
  <text x="80" y="244" fill="#1a2744" font-size="13" font-weight="700">Ancient Greek</text>
  <line x1="80" y1="252" x2="80" y2="310" stroke="#b8af9a" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="92" y="268" fill="#3d3d3d" font-size="11">Epic &#xB7; Attic &#xB7; Ionic &#xB7; Koine</text>
  <text x="92" y="286" fill="#3d3d3d" font-size="11">Doric &#xB7; Aeolic &#xB7; Laconian</text>
  <text x="92" y="304" fill="#8a8279" font-size="9" font-style="italic">60K entries, 1.5M pairs</text>

  <!-- ── Center: funnel ── -->
  <path d="M265,80 L310,190 L310,220 L265,340 L285,340 L330,220 L330,190 L285,80 Z" fill="#d5d0c3" opacity="0.6"/>
  <text x="297" y="195" text-anchor="middle" fill="#8a8279" font-size="9" letter-spacing="0.5">3.4M</text>
  <text x="297" y="210" text-anchor="middle" fill="#8a8279" font-size="9" letter-spacing="0.5">PAIRS</text>

  <!-- ── Right: Dilemma layers ── -->
  <text x="520" y="42" text-anchor="middle" fill="#1a2744" font-size="26" font-weight="700" font-style="italic" letter-spacing="1.5">Dilemma</text>

  <!-- Lookup -->
  <rect x="370" y="62" width="300" height="100" rx="2" fill="#f5f2ec" stroke="#1a2744" stroke-width="1"/>
  <rect x="370" y="62" width="300" height="26" rx="2" fill="#1a2744"/>
  <text x="520" y="80" text-anchor="middle" fill="#f5f2ec" font-size="12" font-weight="700">Lookup Table</text>
  <text x="520" y="108" text-anchor="middle" fill="#3d3d3d" font-size="11">12.3 million indexed forms</text>
  <text x="520" y="126" text-anchor="middle" fill="#6b6560" font-size="10">polytonic &#xB7; monotonic &#xB7; accent-stripped</text>
  <text x="520" y="150" text-anchor="middle" fill="#1a2744" font-size="11" font-style="italic">instant resolution</text>

  <!-- miss arrow -->
  <text x="520" y="184" text-anchor="middle" fill="#8a8279" font-size="10">miss &#x2193;</text>

  <!-- Transformer -->
  <rect x="370" y="198" width="300" height="120" rx="2" fill="#f5f2ec" stroke="#4a6fa5" stroke-width="1"/>
  <rect x="370" y="198" width="300" height="26" rx="2" fill="#4a6fa5"/>
  <text x="520" y="216" text-anchor="middle" fill="#f5f2ec" font-size="12" font-weight="700">Character Transformer</text>
  <text x="520" y="244" text-anchor="middle" fill="#3d3d3d" font-size="11">3-layer encoder + 3-layer decoder</text>
  <text x="520" y="262" text-anchor="middle" fill="#3d3d3d" font-size="11">~381 char vocabulary &#xB7; 4M parameters</text>
  <text x="520" y="284" text-anchor="middle" fill="#6b6560" font-size="10">learns: -&#x03C9;&#x03C3;&#x03B5; &#x2192; -&#x03C9;&#x03BD;&#x03C9; &#xB7; -&#x03BF;&#x03C5;&#x03C3;&#x03B1;&#x03BD; &#x2192; -&#x03C9;</text>
  <text x="520" y="306" text-anchor="middle" fill="#4a6fa5" font-size="11" font-style="italic">&lt;1ms per word &#xB7; PyTorch or ONNX</text>

  <!-- beam candidates arrow -->
  <text x="520" y="340" text-anchor="middle" fill="#8a8279" font-size="10">beam candidates &#x2193;</text>

  <!-- Headword filter -->
  <rect x="370" y="350" width="300" height="48" rx="2" fill="#f5f2ec" stroke="#7a6e5d" stroke-width="1"/>
  <rect x="370" y="350" width="300" height="24" rx="2" fill="#7a6e5d"/>
  <text x="520" y="367" text-anchor="middle" fill="#f5f2ec" font-size="12" font-weight="700">Headword Filter</text>
  <text x="520" y="390" text-anchor="middle" fill="#3d3d3d" font-size="10">~900K headwords (Wiktionary + LSJ + Cunliffe)</text>

  <!-- output -->
  <text x="520" y="412" text-anchor="middle" fill="#8a8279" font-size="10">&#x2193;</text>
  <rect x="460" y="418" width="120" height="24" rx="2" fill="#1a2744"/>
  <text x="520" y="435" text-anchor="middle" fill="#f5f2ec" font-size="12" font-weight="700">lemma</text>
</svg>
