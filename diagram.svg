<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="Georgia,serif">
  <rect width="700" height="380" fill="#faf9f6"/>

  <!-- thin border -->
  <rect x="1" y="1" width="698" height="378" rx="3" fill="none" stroke="#d4d0c8" stroke-width="0.5"/>

  <!-- ── Left: variety tree ── -->
  <text x="42" y="38" fill="#1a1a1a" font-size="14" font-weight="700" font-family="'Helvetica Neue',Helvetica,sans-serif">Sources</text>

  <!-- trunk lines -->
  <line x1="52" y1="56" x2="52" y2="340" stroke="#c4b99a" stroke-width="1.5"/>

  <!-- Modern Greek branch -->
  <line x1="52" y1="72" x2="76" y2="72" stroke="#c4b99a" stroke-width="1.5"/>
  <text x="80" y="76" fill="#2d6a4f" font-size="13" font-weight="700">Modern Greek</text>
  <line x1="80" y1="84" x2="80" y2="186" stroke="#c4b99a" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="92" y="100" fill="#3a3a3a" font-size="11">SMG / Demotic</text>
  <text x="92" y="118" fill="#3a3a3a" font-size="11">Katharevousa</text>
  <text x="92" y="136" fill="#3a3a3a" font-size="11">Cypriot</text>
  <text x="92" y="154" fill="#3a3a3a" font-size="11">Cretan</text>
  <text x="92" y="172" fill="#777" font-size="10">Heptanesian, Maniot</text>
  <text x="92" y="188" fill="#999" font-size="9" font-style="italic">877K + 5K tagged entries</text>

  <!-- Medieval branch -->
  <line x1="52" y1="218" x2="76" y2="218" stroke="#c4b99a" stroke-width="1.5"/>
  <text x="80" y="222" fill="#6b21a8" font-size="13" font-weight="700">Medieval</text>
  <line x1="80" y1="230" x2="80" y2="248" stroke="#c4b99a" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="92" y="246" fill="#3a3a3a" font-size="11">Byzantine</text>
  <text x="92" y="262" fill="#999" font-size="9" font-style="italic">3K entries</text>

  <!-- Ancient Greek branch -->
  <line x1="52" y1="284" x2="76" y2="284" stroke="#c4b99a" stroke-width="1.5"/>
  <text x="80" y="288" fill="#1e40af" font-size="13" font-weight="700">Ancient Greek</text>
  <line x1="80" y1="296" x2="80" y2="346" stroke="#c4b99a" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="92" y="312" fill="#3a3a3a" font-size="11">Epic &#xB7; Attic &#xB7; Ionic &#xB7; Koine</text>
  <text x="92" y="330" fill="#3a3a3a" font-size="11">Doric &#xB7; Aeolic &#xB7; Laconian</text>
  <text x="92" y="346" fill="#999" font-size="9" font-style="italic">60K entries, 1.5M pairs</text>

  <!-- ── Center: funnel ── -->
  <path d="M265,80 L310,190 L310,220 L265,340 L285,340 L330,220 L330,190 L285,80 Z" fill="#e8e4da" opacity="0.5"/>
  <text x="297" y="195" text-anchor="middle" fill="#8a7e6b" font-size="9" font-family="'Helvetica Neue',Helvetica,sans-serif" letter-spacing="0.5">3.4M</text>
  <text x="297" y="210" text-anchor="middle" fill="#8a7e6b" font-size="9" font-family="'Helvetica Neue',Helvetica,sans-serif" letter-spacing="0.5">PAIRS</text>

  <!-- ── Right: Dilemma layers ── -->
  <text x="390" y="38" fill="#1a1a1a" font-size="14" font-weight="700" font-family="'Helvetica Neue',Helvetica,sans-serif">Dilemma</text>

  <!-- Lookup -->
  <rect x="370" y="62" width="300" height="100" rx="2" fill="none" stroke="#2d6a4f" stroke-width="1.2"/>
  <rect x="370" y="62" width="300" height="26" rx="2" fill="#2d6a4f"/>
  <text x="520" y="80" text-anchor="middle" fill="#fff" font-size="12" font-weight="700" font-family="'Helvetica Neue',Helvetica,sans-serif">Lookup Table</text>
  <text x="520" y="108" text-anchor="middle" fill="#3a3a3a" font-size="11">6.5 million indexed forms</text>
  <text x="520" y="126" text-anchor="middle" fill="#777" font-size="10">polytonic &#xB7; monotonic &#xB7; accent-stripped</text>
  <text x="520" y="150" text-anchor="middle" fill="#2d6a4f" font-size="11" font-style="italic">instant resolution</text>

  <!-- miss arrow -->
  <text x="520" y="184" text-anchor="middle" fill="#999" font-size="10" font-family="'Helvetica Neue',Helvetica,sans-serif">miss &#x2193;</text>

  <!-- Transformer -->
  <rect x="370" y="198" width="300" height="120" rx="2" fill="none" stroke="#b45309" stroke-width="1.2"/>
  <rect x="370" y="198" width="300" height="26" rx="2" fill="#b45309"/>
  <text x="520" y="216" text-anchor="middle" fill="#fff" font-size="12" font-weight="700" font-family="'Helvetica Neue',Helvetica,sans-serif">Character Transformer</text>
  <text x="520" y="244" text-anchor="middle" fill="#3a3a3a" font-size="11">3-layer encoder + 3-layer decoder</text>
  <text x="520" y="262" text-anchor="middle" fill="#3a3a3a" font-size="11">~160 char vocabulary &#xB7; 4M parameters</text>
  <text x="520" y="284" text-anchor="middle" fill="#777" font-size="10">learns: -ωσε &#x2192; -ωνω &#xB7; -ουσαν &#x2192; -ω</text>
  <text x="520" y="306" text-anchor="middle" fill="#b45309" font-size="11" font-style="italic">&lt;1ms per word</text>

  <!-- output -->
  <text x="520" y="340" text-anchor="middle" fill="#999" font-size="10" font-family="'Helvetica Neue',Helvetica,sans-serif">&#x2193;</text>
  <rect x="460" y="348" width="120" height="24" rx="2" fill="#1a1a1a"/>
  <text x="520" y="365" text-anchor="middle" fill="#faf9f6" font-size="12" font-weight="700" font-family="'Helvetica Neue',Helvetica,sans-serif">lemma</text>
</svg>
