  <text x="140" y="150" fill="#2d6a4f" font-size="12" font-weight="600">πολεμώ</text>
  <text x="290" y="150" fill="#888" font-size="10">SMG</text>

  <text x="32" y="172" fill="#1a1a1a" font-size="12">μήνιδος</text>
  <text x="120" y="172" fill="#999" font-size="11">&#x2192;</text>
  <text x="140" y="172" fill="#2d6a4f" font-size="12" font-weight="600">μῆνις</text>
  <text x="290" y="172" fill="#888" font-size="10">Epic</text>

  <text x="32" y="194" fill="#1a1a1a" font-size="12">ἐβασίλευσεν</text>
  <text x="120" y="194" fill="#999" font-size="11">&#x2192;</text>
  <text x="140" y="194" fill="#2d6a4f" font-size="12" font-weight="600">βασιλεύω</text>
  <text x="290" y="194" fill="#888" font-size="10">Koine</text>

  <text x="32" y="216" fill="#1a1a1a" font-size="12">κοπέλλα</text>
  <text x="120" y="216" fill="#999" font-size="11">&#x2192;</text>
  <text x="140" y="216" fill="#2d6a4f" font-size="12" font-weight="600">κοπέλα</text>
  <text x="290" y="216" fill="#888" font-size="10">Cypriot</text>

  <text x="32" y="238" fill="#1a1a1a" font-size="12">τρομερό</text>
  <text x="120" y="238" fill="#999" font-size="11">&#x2192;</text>
  <text x="140" y="238" fill="#2d6a4f" font-size="12" font-weight="600">τρομερός</text>
  <text x="290" y="238" fill="#888" font-size="10">SMG</text>

  <text x="185" y="264" text-anchor="middle" fill="#2d6a4f" font-size="9.5" font-style="italic">6.5M forms indexed, instant</text>

  <!-- divider -->
  <line x1="362" y1="46" x2="362" y2="278" stroke="#d4d0c8" stroke-width="0.5"/>

