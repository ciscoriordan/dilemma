<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 330" font-family="Georgia,serif">
  <rect width="720" height="330" fill="#faf9f6"/>
  <rect x="1" y="1" width="718" height="328" rx="3" fill="none" stroke="#d4d0c8" stroke-width="0.5"/>

  <text x="360" y="28" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="700" font-family="'Helvetica Neue',Helvetica,sans-serif">Lemmatization examples across varieties</text>

