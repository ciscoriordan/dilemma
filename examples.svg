  <text x="630" y="82" fill="#999" font-size="9" font-family="'Helvetica Neue',Helvetica,sans-serif">PATTERN</text>
  <line x1="380" y1="87" x2="694" y2="87" stroke="#e0ddd6" stroke-width="0.5"/>

  <text x="386" y="106" fill="#1a1a1a" font-size="12">εσκότωσε</text>
  <text x="478" y="106" fill="#999" font-size="11">&#x2192;</text>
  <text x="498" y="106" fill="#b45309" font-size="12" font-weight="600">σκοτώνω</text>
  <text x="630" y="106" fill="#888" font-size="9">augment strip</text>

  <text x="386" y="128" fill="#1a1a1a" font-size="12">εφώναξε</text>
  <text x="478" y="128" fill="#999" font-size="11">&#x2192;</text>
  <text x="498" y="128" fill="#b45309" font-size="12" font-weight="600">φωνάζω</text>
  <text x="630" y="128" fill="#888" font-size="9">-αξε &#x2192; -άζω</text>

  <text x="386" y="150" fill="#1a1a1a" font-size="12">εσήκωσε</text>
  <text x="478" y="150" fill="#999" font-size="11">&#x2192;</text>
  <text x="498" y="150" fill="#b45309" font-size="12" font-weight="600">σηκώνω</text>
  <text x="630" y="150" fill="#888" font-size="9">-ωσε &#x2192; -ώνω</text>

  <text x="386" y="172" fill="#1a1a1a" font-size="12">ανδρειωμένων</text>
  <text x="478" y="172" fill="#999" font-size="11">&#x2192;</text>
  <text x="498" y="172" fill="#b45309" font-size="12" font-weight="600">ανδρειωμένος</text>
  <text x="630" y="172" fill="#888" font-size="9">gen.pl &#x2192; nom</text>

  <text x="386" y="194" fill="#1a1a1a" font-size="12">εξηγήσεων</text>
  <text x="478" y="194" fill="#999" font-size="11">&#x2192;</text>
  <text x="498" y="194" fill="#b45309" font-size="12" font-weight="600">εξήγηση</text>
  <text x="630" y="194" fill="#888" font-size="9">Kath. gen.pl</text>

  <text x="386" y="216" fill="#1a1a1a" font-size="12">διεπραγματεύθη</text>
  <text x="386" y="232" fill="#b45309" font-size="12" font-weight="600">&#x2192; διαπραγματεύομαι</text>
  <text x="630" y="224" fill="#888" font-size="9">Kath. aor. pass.</text>

  <text x="537" y="264" text-anchor="middle" fill="#b45309" font-size="9.5" font-style="italic">4M params, &lt;1ms per word</text>

  <!-- Footer -->
  <line x1="28" y1="288" x2="694" y2="288" stroke="#e0ddd6" stroke-width="0.5"/>
  <text x="360" y="310" text-anchor="middle" fill="#aaa" font-size="9.5" font-family="'Helvetica Neue',Helvetica,sans-serif">Lookup resolves 99%+ of known forms. Transformer generalizes to novel inflections and cross-period morphology.</text>
</svg>
