  <rect x="374" y="46" width="326" height="18" rx="1" fill="#b45309"/>
  <text x="537" y="59" text-anchor="middle" fill="#fff" font-size="10" font-weight="600" font-family="'Helvetica Neue',Helvetica,sans-serif">TRANSFORMER (unseen forms)</text>

