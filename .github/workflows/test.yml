name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Download lookup data from HuggingFace Hub
        run: |
          pip install -q huggingface_hub
          hf download ciscoriordan/dilemma --local-dir . --include "data/lookup.db"

      - name: Run all tests
        run: python3 -m pytest tests/ -x -v
