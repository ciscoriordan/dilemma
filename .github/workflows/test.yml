name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 15
    env:
      HOME: /root

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Pull LFS data files
        run: |
          git lfs install --force
          git lfs pull --include="data/lookup.db,data/spell_index.db"

      - name: Run all tests
        run: python -m pytest tests/ -x -v
